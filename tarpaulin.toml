[report]
# Tarpaulin configuration for accurate coverage reporting
out = ["Html", "Lcov", "Stdout"]
output-dir = "coverage"

[run]
all-features = true
workspace = true

# Exclude test-only modules from coverage denominator so the 95 % threshold
# reflects production logic only, not test helper code.
exclude-files = ["src/test.rs", "tests/*"]

# Branch coverage gives a more accurate picture for match/if chains.
count-branches = true

